# Nginx site config — copy to /etc/nginx/sites-available/chi-dashboard
# Replace YOUR_DOMAIN with your server IP or domain name.

upstream chi_dashboard {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name YOUR_DOMAIN;

    client_max_body_size 20M;

    location /static/ {
        alias /var/www/chi-dashboard/staticfiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://chi_dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
